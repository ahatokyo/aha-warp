<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>PETCHA by AHA TOKYO</title>
<!-- 旧URL(pecha.html)互換スタブ：petcha.html へ透過リダイレクト。
     ?gift=... / ?paid=1 / ?code=... などのクエリと #ハッシュを保持して引き継ぐ。
     ・ブックマーク済みユーザー対策
     ・LINEログインのコールバック(redirect_uri=pecha.html)をここで受けて petcha.html へ橋渡し -->
<script>
  location.replace('petcha.html' + location.search + location.hash);
</script>
</head>
<body style="font-family:sans-serif;text-align:center;padding:2rem;color:#3D1A5A;">
  <p>ページが移動しました。</p>
  <p><a id="go" href="petcha.html">PETCHA を開く 🐾</a></p>
  <script>
    // スクリプト無効環境向けフォールバック（クエリ/ハッシュ保持）
    document.getElementById('go').href = 'petcha.html' + location.search + location.hash;
  </script>
</body>
</html>
